<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет преподавателя - Профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">
            <i class="fas fa-school"></i>
        </div>
        <div class="logo-text">
            <h1>Кабинет преподавателя</h1>
            <p>Учебный портал</p>
        </div>
    </div>

    <div class="user-info">
        <div class="user-avatar">
            <i class="fas fa-user"></i>
        </div>
        <div class="user-details">
            <h3 id="teacher-name"></h3>
            <p id="teacher-subject"></p>
        </div>
    </div>

    <a href="#" id="logout-btn" class="btn btn-danger">Выйти</a>
</header>

<div class="container">
    <aside class="sidebar">
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="index.html">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Обзор</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="currTest.html">
                    <i class="fas fa-tasks"></i>
                    <span>Доступные тесты</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="results.html">
                    <i class="fas fa-chart-bar"></i>
                    <span>Результаты</span>
                </a>
            </li>
            <li class="nav-item active">
                <a href="profile.html">
                    <i class="fas fa-user-cog"></i>
                    <span>Профиль</span>
                </a>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="content-tab active">
            <div class="tab-header">
                <h2>Профиль преподавателя</h2>
            </div>

            <div class="profile-container">
                <div class="profile-info">
                    <div class="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="profile-details">
                        <h3 id="profile-name"></h3>
                        <p><strong>Логин:</strong> <span id="profile-login"></span></p>
                        <p><strong>Предмет:</strong> <span id="profile-subject"></span></p>
                        <p><strong>Дата регистрации:</strong> <span id="profile-date"></span></p>
                    </div>
                </div>

                <div class="profile-stats">
                    <h4>Статистика по предмету</h4>
                    <div class="stats-list">
                        <div class="stat-item">
                            <span class="stat-label">Всего тестов:</span>
                            <span class="stat-value" id="total-tests">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Пройдено тестов:</span>
                            <span class="stat-value" id="passed-tests">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Лучший результат:</span>
                            <span class="stat-value" id="best-result">0%</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Средний балл:</span>
                            <span class="stat-value" id="avg-time">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="teacher.js"></script>
</body>
</html>
